name: 自动保活 SAP

on:
  schedule:
    - cron: '*/2 * * * *'     # 每2分钟检查一次
  workflow_dispatch:  # 允许手动触发

jobs:
  keepalive-and-restart:
    runs-on: ubuntu-latest
    name: Check URL and Restart SG Apps
    if: always()
    continue-on-error: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check node URL health
      id: check-url
      run: |
        echo "检查节点 URL: https://sap.cailuo.ggff.net/yidai123"
        HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" --connect-timeout 10 "https://sap.cailuo.ggff.net/yidai123" || echo "000")
        echo "HTTP_CODE=$HTTP_CODE"
        echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ 节点 URL 正常 (HTTP $HTTP_CODE)"
        else
          echo "⚠️ 节点 URL 异常 (HTTP $HTTP_CODE)，需要重启应用"
        fi

    - name: Install CF CLI
      if: steps.check-url.outputs.http_code != '200'
      run: |
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update
        sudo apt-get install -y cf8-cli

    - name: Login to Cloud Foundry
      if: steps.check-url.outputs.http_code != '200'
      run: |
        echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
        echo "使用API端点: $CF_API (区域: SG)"
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}"
        ORG=$(cf orgs | sed -n '4p')
        echo "ORG=$ORG" >> $GITHUB_ENV
        echo "使用空间: dev"
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}" -o "$ORG" -s "dev"

    - name: Restart all applications
      if: steps.check-url.outputs.http_code != '200'
      run: |
        apps=$(cf apps | awk 'NR>3 {print $1}' | grep -v '^$')
        if [ -z "$apps" ]; then
          echo "未找到任何应用"
          exit 0
        fi
        echo "重启应用: $apps"
        for app in $apps; do
          echo "正在重启: $app"
          cf restart "$app"
          sleep 20
        done

    - name: Verify applications status
      if: steps.check-url.outputs.http_code != '200'
      run: |
        echo "应用状态:"
        cf apps

    - name: Re-check URL after restart
      if: steps.check-url.outputs.http_code != '200'
      run: |
        echo "等待30秒后重新检查..."
        sleep 30
        HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" --connect-timeout 10 "https://sap.cailuo.ggff.net/yidai123" || echo "000")
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ 节点已恢复！(HTTP $HTTP_CODE)"
        else
          echo "❌ 节点仍然异常 (HTTP $HTTP_CODE)"
        fi
