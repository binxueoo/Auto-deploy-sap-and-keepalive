name: Auto Deploy Proxy Node

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'ﾑ｡魹ｽ魹ｽ魹ｽ魹ｽﾄｽﾚｵ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ'
        required: true
        default: 'Argo魹ｽ魹ｽ魹ｽCDN'
        type: choice
        options:
          - wsﾖｱ魹ｽ魹ｽ
          - xhttpﾖｱ魹ｽ魹ｽ
          - Argo魹ｽ魹ｽ魹ｽCDN
      region:
        description: 'ﾑ｡魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ'
        required: true
        default: 'US(free)'
        type: choice
        options:
          - SG(free)
          - US(free)
          - AWS-AU(Sydney)
          - AWS-BR(S?o Paulo)
          - AWS-KR(Seoul)
          - AWS-CA(Montreal)
          - AWS-US(VA)
          - AWS-US(OR)
          - AWS-EU(Frankfurt)
          - AWS-JP(Tokyo)
          - AWS-SG(Singapore)
          - GCP-AU(Sydney)
          - GCP-BR(S?o Paulo)
          - GCP-US(IA)
          - GCP-EU(Frankfurt)
          - GCP-JP(Osaka)
          - GCP-JP(Tokyo)
          - GCP-IL(Tel Aviv)
          - GCP-IN(Mumbai)
          - GCP-KSA(Dammam)
          - Azure-AU(Sydney)
          - Azure-BR(S?o Paulo)
          - Azure-CA(Montreal)
          - Azure-US(VA)
          - Azure-US(WA)
          - Azure-EU(Netherlands)
          - Azure-JP(Tokyo)
          - Azure-SG(Singapore)
          - Neo-UAE(Dubai)
          - Neo-KSA(Riyadh)
      app_name:
        description: 'ﾓｦ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾆ｣魹ｽ魹ｽ魹ｽﾑ｡魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾔｶ魹ｽ魹ｽ魹ｽ魹ｽﾉ｣魹ｽ'
        required: false
        default: ''

env:
  MEMORY: 512M
  DISK: 512M

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download fixed index.js from fork repo
      run: |
        curl -sL "https://raw.githubusercontent.com/binxueoo/LWargo1218/main/index.js" -o index.js
        curl -sL "https://raw.githubusercontent.com/binxueoo/LWargo1218/main/package.json" -o package.json
        ls -la index.js package.json

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/binxueoo/sap-node:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Install CF CLI
      run: |
        sudo apt-get update
        sudo apt-get install -y wget curl gnupg
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo gpg --dearmor -o /usr/share/keyrings/cloudfoundry-cli.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloudfoundry-cli.gpg] https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update
        sudo apt-get install -y cf8-cli

    - name: Determine CF API endpoint and app name
      run: |
        RANDOM_STR=$(head /dev/urandom | tr -dc 'a-z' | head -c 6)

        case "${{ github.event.inputs.region }}" in
          "SG(free)")
            echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=free-sg$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "US(free)")
            echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=free-us$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-AU(Sydney)")
            echo "CF_API=https://api.cf.ap10.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=aws-au$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-BR(S?o Paulo)")
            echo "CF_API=https://api.cf.br10.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=aws-br$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-KR(Seoul)")
            echo "CF_API=https://api.cf.ap12.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=aws-kr$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-CA(Montreal)")
            echo "CF_API=https://api.cf.ca10.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=aws-ca$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-US(VA)")
            echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=aws-usva$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-US(OR)")
            echo "CF_API=https://api.cf.us11.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=aws-usor$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-EU(Frankfurt)")
            echo "CF_API=https://api.cf.eu10-005.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=aws-eu$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-JP(Tokyo)")
            echo "CF_API=https://api.cf.jp10.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=aws-jp$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-SG(Singapore)")
            echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=aws-sg$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-AU(Sydney)")
            echo "CF_API=https://api.cf.ap30.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=gcp-au$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-BR(S?o Paulo)")
            echo "CF_API=https://api.cf.br30.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=gcp-br$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-US(IA)")
            echo "CF_API=https://api.cf.us30.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=gcp-us$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-EU(Frankfurt)")
            echo "CF_API=https://api.cf.eu30.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=gcp-eu$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-JP(Osaka)")
            echo "CF_API=https://api.cf.jp30.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=gcp-jpo$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-JP(Tokyo)")
            echo "CF_API=https://api.cf.jp31.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=gcp-jpt$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-IL(Tel Aviv)")
            echo "CF_API=https://api.cf.il30.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=gcp-il$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-IN(Mumbai)")
            echo "CF_API=https://api.cf.in30.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=gcp-in$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-KSA(Dammam)")
            echo "CF_API=https://api.cf.sa31.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=gcp-sa$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Azure-AU(Sydney)")
            echo "CF_API=https://api.cf.ap20.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=az-au$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Azure-BR(S?o Paulo)")
            echo "CF_API=https://api.cf.br20.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=az-br$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Azure-CA(Montreal)")
            echo "CF_API=https://api.cf.ca20.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=az-ca$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Azure-US(VA)")
            echo "CF_API=https://api.cf.us21.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=az-va$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Azure-US(WA)")
            echo "CF_API=https://api.cf.us20.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=az-wa$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Azure-EU(Netherlands)")
            echo "CF_API=https://api.cf.eu20-001.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=az-eu$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Azure-JP(Tokyo)")
            echo "CF_API=https://api.cf.jp20.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=az-jp$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Azure-SG(Singapore)")
            echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=az-sg$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Neo-UAE(Dubai)")
            echo "CF_API=https://api.cf.neo-ae1.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=neo-uae$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Neo-KSA(Riyadh)")
            echo "CF_API=https://api.cf.neo-sa1.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=neo-ksa$RANDOM_STR" >> $GITHUB_ENV
            ;;
        esac

        if [ -n "${{ github.event.inputs.app_name }}" ]; then
          echo "APP_NAME=${{ github.event.inputs.app_name }}" >> $GITHUB_ENV
        fi

        if [[ -n "${{ secrets.DOCKER_IMAGE }}" ]]; then
          echo "DOCKER_IMAGE=${{ secrets.DOCKER_IMAGE }}" >> $GITHUB_ENV
        else
          echo "DOCKER_IMAGE=ghcr.io/binxueoo/sap-node:latest" >> $GITHUB_ENV
        fi

        echo "ﾊｹ魹ｽ魹ｽAPI魹ｽﾋｵ魹ｽ: $CF_API"
        echo "ﾓｦ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ: $APP_NAME"
        echo "魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ: ${{ env.DOCKER_IMAGE }}"

    - name: Login to Cloud Foundry
      run: |
        echo "--- 魹ｽ魹ｽﾒｻ魹ｽ魹ｽ: 魹ｽ魹ｽﾂｼCF ---"
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}" && echo "魹ｽ魹ｽﾂｼ魹ｽﾉｹ魹ｽ" || { echo "CF魹ｽ魹ｽﾂｼﾊｧ魹ｽﾜ｣魹ｽ魹ｽ魹ｽ魹ｽ魹ｽEMAIL魹ｽ魹ｽPASSWORD secrets"; exit 1; }

        echo "--- 魹ｽﾚｶ魹ｽ魹ｽ魹ｽ: 魹ｽ鯀ｴ魹ｽ魹ｽﾇｰtargetﾗｴﾌｬ ---"
        cf target || echo "ﾎｴ魹ｽ魹ｽ魹ｽ魹ｽtarget"

        echo "--- 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ: 魹ｽ魹ｽﾈ｡魹ｽ魹ｽﾖｯ魹ｽﾐｱ魹ｽ ---"
        cf orgs || echo "魹ｽ魹ｽﾈ｡魹ｽ魹ｽﾖｯ魹ｽﾐｱ魹ｽﾊｧ魹ｽ魹ｽ"
        ORG=$(cf orgs 2>/dev/null | awk 'NR>=4 {print $1}' | head -1)
        echo "魹ｽ魹ｽﾈ｡魹ｽ魹ｽ魹ｽ魹ｽORG=[$ORG]"
        if [ -z "$ORG" ]; then
          echo "魹ｽ魹ｽ魹ｽ魹ｽ: ﾎｴ魹ｽﾒｵ魹ｽ魹ｽﾎｺ魹ｽ魹ｽ魹ｽﾖｯ魹ｽ魹ｽ魹ｽ魹ｽﾈｷ魹ｽ魹ｽSAP魹ｽﾋｻ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾈｷ魹ｽ魹ｽ魹ｽ魹ｽ"
          exit 1
        fi
        echo "ORG=$ORG" >> $GITHUB_ENV

        echo "--- 魹ｽ魹ｽ魹ｽﾄｲ魹ｽ: 魹ｽ魹ｽﾈ｡魹ｽﾕｼ魹ｽ魹ｽﾐｱ魹ｽ ---"
        cf spaces || echo "魹ｽ魹ｽﾈ｡魹ｽﾕｼ魹ｽ魹ｽﾐｱ魹ｽﾊｧ魹ｽ魹ｽ"
        SPACE=$(cf spaces 2>/dev/null | awk 'NR>=4 {print $1}' | head -1)
        echo "魹ｽ魹ｽﾈ｡魹ｽ魹ｽ魹ｽ魹ｽSPACE=[$SPACE]"
        if [ -z "$SPACE" ]; then
          echo "魹ｽ魹ｽ魹ｽ魹ｽ: ﾎｴ魹ｽﾒｵ魹ｽ魹ｽﾎｺﾎｿﾕｼ茱ｬ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽSAP CF魹ｽ魹ｽ魹ｽ魹ｽﾌｨ魹ｽ魹ｽ魹ｽ魹ｽﾒｻ魹ｽ魹ｽ魹ｽﾕｼ魹ｽ"
          exit 1
        fi
        echo "SPACE=$SPACE" >> $GITHUB_ENV

        echo "--- 魹ｽ魹ｽ魹ｽ蟯ｽ: 魹ｽ魹ｽ魹ｽ魹ｽﾖｯ魹ｽﾍｿﾕｼ魹ｽ魹ｽ魹ｽ魹ｽﾂｵ魹ｽﾂｼ ---"
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}" -o "$ORG" -s "$SPACE" || { echo "CF魹ｽ魹ｽ魹ｽﾂｵ魹ｽﾂｼﾊｧ魹ｽ魹ｽ"; exit 1; }
        cf target

    - name: Clean up existing apps to free resources
      run: |
        echo "魹ｽ魹ｽ魹ｽ魹ｽﾑｲ魹ｽ魹ｽ魹ｽ魹ｽﾓｦ魹ｽ魹ｽ..."
        APPS=$(cf apps | awk 'NR>3 {print $1}')
        if [ -n "$APPS" ]; then
          echo "魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾑｲ魹ｽ魹ｽ魹ｽ魹ｽﾓｦ魹ｽ魹ｽ:"
          echo "$APPS"
          echo "魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾓｦ魹ｽ魹ｽ魹ｽﾍｷ魹ｽ魹ｽ魹ｽﾔｴ..."
          for app in $APPS; do
            cf delete "$app" -r -f
          done
          echo "魹ｽﾈｴ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ..."
          sleep 10
        else
          echo "ﾃｻ魹ｽ魹ｽ魹ｽﾑｲ魹ｽ魹ｽ魹ｽ魹ｽﾓｦ魹ｽﾃ｣魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ"
        fi

    # Env vars will be set via manifest.yml
      run: |
        cat > manifest.yml << 'MANIFEST_EOF'
applications:
  - name: ${{ env.APP_NAME }}
    memory: ${{ env.MEMORY }}
    disk_quota: ${{ env.DISK }}
    docker:
      image: ${{ env.DOCKER_IMAGE }}
    health-check-type: port
    env:
      NAME: SAP
      UUID: ${{ secrets.UUID }}
      NEZHA_SERVER: ${{ secrets.NEZHA_SERVER }}
      NEZHA_PORT: ${{ secrets.NEZHA_PORT }}
      NEZHA_KEY: ${{ secrets.NEZHA_KEY }}
      ARGO_PORT: ${{ secrets.ARGO_PORT }}
      ARGO_DOMAIN: ${{ secrets.ARGO_DOMAIN }}
      ARGO_AUTH: ${{ secrets.ARGO_AUTH }}
      SUB_PATH: ${{ secrets.SUB_PATH }}
      CFIP: ${{ secrets.CFIP || 'cf.877774.xyz' }}
      CFPORT: ${{ secrets.CFPORT }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
MANIFEST_EOF
        echo "=== manifest.yml ==="
        cat manifest.yml | grep -v "ARGO_AUTH" | grep -v "NEZHA_KEY" | grep -v "UUID"
        echo "ARGO_AUTH is set: $(grep -c 'ARGO_AUTH' manifest.yml)"
    - name: Deploy application
      run: |
        echo "Deploying with image: ${{ env.DOCKER_IMAGE }}"
        if cf push ${{ env.APP_NAME }} --docker-image ${{ env.DOCKER_IMAGE }} -m ${{ env.MEMORY }} -k ${{ env.DISK }} --health-check-type port; then
          echo "Deployment successful"
        else
          cf delete ${{ env.APP_NAME }} -r -f
          echo "魹ｽ魹ｽ魹ｽ魹ｽﾊｧ魹ｽﾜ｣魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾔｭ魹ｽ魹ｽ"
          echo "1. 魹ｽﾚｴ魹ｽ魹ｽ魹ｽ譩ｻ魹ｽ罐ｨ魹ｽ魹ｽﾈｷ魹ｽ魹ｽSAP魹ｽﾋｻ魹ｽ魹ｽ魹ｽ魹ｽ羯ｻ魹ｽ魹ｽ詝ｩ"
          echo "2. Docker魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾈ｡ﾊｧ魹ｽﾜ｣魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ: ${{ env.DOCKER_IMAGE }}魹ｽ魹ｽ"
          echo "3. 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ"
          echo "魹ｽ魹ｽ魹ｽ鬟ｺ魹ｽ魹ｽ魹ｽ魹ｽ8:20-9:00魹ｽﾙｳ魹ｽ魹ｽﾔｲ魹ｽ魹ｽ㝢ｬｻ魹ｽ魹ｽ魹ｽ DOCKER_IMAGE secret 魹ｽﾇｷ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾈｷ"
          exit 1
        fi

    - name: Set environment variables
      run: |
        cf set-env ${{ env.APP_NAME }} NAME "SAP"
        cf set-env ${{ env.APP_NAME }} UUID "${{ secrets.UUID }}"
        cf set-env ${{ env.APP_NAME }} NEZHA_SERVER "${{ secrets.NEZHA_SERVER }}"
        cf set-env ${{ env.APP_NAME }} NEZHA_PORT "${{ secrets.NEZHA_PORT }}"
        cf set-env ${{ env.APP_NAME }} NEZHA_KEY "${{ secrets.NEZHA_KEY }}"
        cf set-env ${{ env.APP_NAME }} ARGO_PORT "${{ secrets.ARGO_PORT }}"
        cf set-env ${{ env.APP_NAME }} ARGO_DOMAIN "${{ secrets.ARGO_DOMAIN }}"
        cf set-env ${{ env.APP_NAME }} ARGO_AUTH "${{ secrets.ARGO_AUTH }}"
        cf set-env ${{ env.APP_NAME }} SUB_PATH "${{ secrets.SUB_PATH }}"
        cf set-env ${{ env.APP_NAME }} CFIP "${{ secrets.CFIP || 'cf.877774.xyz' }}"
        cf set-env ${{ env.APP_NAME }} CFPORT "${{ secrets.CFPORT }}"
        cf set-env ${{ env.APP_NAME }} CHAT_ID "${{ secrets.CHAT_ID }}"
        cf set-env ${{ env.APP_NAME }} BOT_TOKEN "${{ secrets.BOT_TOKEN }}"

        if [ -f .env ]; then
          while IFS= read -r line; do
            if [[ ! "$line" =‾ ^# ]] && [[ -n "$line" ]]; then
              IFS='=' read -r key value <<< "$line"
              cf set-env ${{ env.APP_NAME }} "$key" "$value"
            fi
          done < .env
        fi

        if [[ "${{ env.DOCKER_IMAGE }}" =‾ (xhttp|goxhttp|ws) ]]; then
          ROUTE=$(cf app ${{ env.APP_NAME }} | grep "routes:" | awk '{print $2}')
          if [ -n "$ROUTE" ]; then
            echo "魹ｽ魹ｽ魹ｽ魹ｽ DOMAIN 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾎｪ: $ROUTE"
            cf set-env ${{ env.APP_NAME }} DOMAIN "$ROUTE"
          else
            echo "ﾎｴ魹ｽﾒｵ魹ｽﾓｦ魹ｽ魹ｽﾂｷ魹ｽﾉ｣魹ｽ魹ｽﾞｷ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ DOMAIN,魹ｽ魹ｽ魹ｽﾖｶ魹ｽ魹ｽ魹ｽ魹ｽﾚｵ魹ｽ魹ｽ魹ｽ魹ｽaddress魹ｽ魹ｽhost魹ｽ魹ｽsni魹ｽ魹ｽﾎｪﾓｦ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ"
          fi
        fi

    - name: Restage application
      run: |
        cf restage ${{ env.APP_NAME }}

    - name: Check app logs
      run: |
        echo "=== Environment variables ==="
        cf env ${{ env.APP_NAME }}
        echo "=== Recent logs ==="
        cf logs ${{ env.APP_NAME }} --recent 2>&1
    - name: Verify deployment
      run: |
        cf app ${{ env.APP_NAME }}
        echo "Deployment completed successfully!"

    - name: 魹ｽ魹ｽﾏｸ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾏ｢
      run: |
        echo "魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾉ｣魹ｽ魹ｽ魹ｽﾏｸ魹ｽ魹ｽﾏ｢魹ｽ魹ｽ魹ｽﾂ｣魹ｽ"
