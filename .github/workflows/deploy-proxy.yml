name: Auto Deploy Proxy Node


on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Select region'
        required: true
        default: 'SG(free)'
        type: choice
        options:
          - SG(free)
          - US(free)
      app_name:
        description: 'App name (optional, leave empty for auto-generate)'
        required: false
        default: ''
        type: string

env:
  MEMORY: 512M
  DISK: 512M

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download index.js
      run: |
        curl -sL https://raw.githubusercontent.com/binxueoo/LWargo1218/main/index.js -o index.js
        echo "Downloaded index.js"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/sap-node:latest

    - name: Install CF CLI
      run: |
        curl -L "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github" | tar -zx
        sudo mv cf8 /usr/local/bin/cf
        cf version

    - name: Determine CF API endpoint and app name
      id: cf-config
      run: |
        REGION="${{ github.event.inputs.region }}"
        if [ "$REGION" = "SG(free)" ]; then
          echo "cf_api=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_OUTPUT
        else
          echo "cf_api=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_OUTPUT
        fi

        if [ -n "${{ github.event.inputs.app_name }}" ]; then
          echo "app_name=${{ github.event.inputs.app_name }}" >> $GITHUB_OUTPUT
        else
          echo "app_name=free-sg$(openssl rand -hex 4)" >> $GITHUB_OUTPUT
        fi

    - name: Login to Cloud Foundry
      run: |
        cf api ${{ steps.cf-config.outputs.cf_api }}
        cf auth "${{ secrets.CF_USER }}" "${{ secrets.CF_PASSWORD }}"
        cf target -o "${{ secrets.CF_ORG }}" -s "${{ secrets.CF_SPACE }}"

    - name: Clean up existing apps
      run: |
        APPS=$(cf apps | grep "^free-" | awk '{print $1}' || true)
        for app in $APPS; do
          cf delete "$app" -f -r 2>/dev/null || true
        done

    - name: Deploy application
      run: |
        APP_NAME="${{ steps.cf-config.outputs.app_name }}"
        APP_URL="${APP_NAME}.cfapps.ap21.hana.ondemand.com"
        echo "Deploying with image: ghcr.io/${{ github.repository_owner }}/sap-node:latest"

        cf push "${APP_NAME}" \
          --docker-image "ghcr.io/${{ github.repository_owner }}/sap-node:latest" \
          -m 512M -k 512M \
          --hostname "${APP_NAME}" \
          --no-start

        # Set env vars: use SAP app URL as node address (direct connection, no Argo tunnel)
        cf set-env "${APP_NAME}" CFIP "${APP_URL}"
        cf set-env "${APP_NAME}" CFPORT "443"
        cf set-env "${APP_NAME}" ARGO_DOMAIN "${APP_URL}"
        cf set-env "${APP_NAME}" ARGO_AUTH "none"
        cf set-env "${APP_NAME}" SUB_PATH "${{ secrets.SUB_PATH }}"
        cf set-env "${APP_NAME}" UUID "${{ secrets.UUID }}"
        cf set-env "${APP_NAME}" NEZHA_SERVER "${{ secrets.NEZHA_SERVER }}"
        cf set-env "${APP_NAME}" NEZHA_PORT "${{ secrets.NEZHA_PORT }}"
        cf set-env "${APP_NAME}" NEZHA_KEY "${{ secrets.NEZHA_KEY }}"

        cf start "${APP_NAME}"

    - name: Deployment info
      run: |
        APP_NAME="${{ steps.cf-config.outputs.app_name }}"
        echo "=== Deployment Complete ==="
        echo "App: ${APP_NAME}"
        echo "URL: https://${APP_NAME}.cfapps.ap21.hana.ondemand.com"
        echo "SUB: https://${APP_NAME}.cfapps.ap21.hana.ondemand.com/${{ secrets.SUB_PATH }}"
        echo "Node address: ${APP_NAME}.cfapps.ap21.hana.ondemand.com:443"
        echo "=========================="
