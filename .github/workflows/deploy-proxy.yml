name: Auto Deploy Proxy Node

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Select region'
        required: true
        default: 'SG(free)'
        type: choice
        options:
          - SG(free)
          - US(free)
      app_name:
        description: 'App name (optional, leave empty for auto-generate)'
        required: false
        default: ''

env:
  MEMORY: 512M
  DISK: 512M

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download fixed index.js from fork repo
      run: |
        curl -sL "https://raw.githubusercontent.com/binxueoo/LWargo1218/main/index.js" -o index.js
        curl -sL "https://raw.githubusercontent.com/binxueoo/LWargo1218/main/package.json" -o package.json
        ls -la index.js package.json

    - name: Patch index.js for direct connection (no Argo)
      run: |
        echo "=== Patching index.js for direct connection ==="

        # Add require for net module at the top
        sed -i '1s|^|const net = require("net");\n|' index.js

        # Create WebSocket proxy patch file
        cat > /tmp/ws_patch.js << 'WSEOF'

// ===== WebSocket Proxy to Xray (no Argo tunnel) =====
const WS_PROXY_PATHS = {
  '/vless-argo': 3002,
  '/vmess-argo': 3003,
  '/trojan-argo': 3004
};

server.on('upgrade', (req, socket, head) => {
  const reqPath = req.url.split('?')[0];
  const targetPort = WS_PROXY_PATHS[reqPath];
  if (!targetPort) {
    socket.destroy();
    return;
  }
  console.log('WS proxy: ' + reqPath + ' -> localhost:' + targetPort);
  const proxySocket = net.connect(targetPort, '127.0.0.1', () => {
    const rawReq = req.method + ' ' + req.url + ' HTTP/' + req.httpVersion + '\r\n' +
      Object.entries(req.headers).map(function(e) { return e[0] + ': ' + e[1]; }).join('\r\n') +
      '\r\n\r\n';
    proxySocket.write(rawReq);
    if (head && head.length > 0) proxySocket.write(head);
    socket.pipe(proxySocket);
    proxySocket.pipe(socket);
  });
  proxySocket.on('error', function() { socket.destroy(); });
  socket.on('error', function() { proxySocket.destroy(); });
  socket.on('close', function() { proxySocket.destroy(); });
  proxySocket.on('close', function() { socket.destroy(); });
});
// ===== End WebSocket Proxy =====
WSEOF

        # Insert patch before server.listen
        LINE_NUM=$(grep -n "server.listen" index.js | tail -1 | cut -d: -f1)
        if [ -z "$LINE_NUM" ]; then
          echo "ERROR: Could not find server.listen"
          exit 1
        fi
        echo "Found server.listen at line $LINE_NUM"
        head -n $((LINE_NUM - 1)) index.js > /tmp/index_patched.js
        cat /tmp/ws_patch.js >> /tmp/index_patched.js
        tail -n +$LINE_NUM index.js >> /tmp/index_patched.js
        mv /tmp/index_patched.js index.js

        # Patch subscription URLs to use APP_URL directly
        sed -i 's|const nodeName = NAME ?.*|const appHost = new URL(process.env.APP_URL || "https://localhost").hostname;|' index.js
        sed -i "s|add: CFIP, port: CFPORT|add: appHost, port: 443|g" index.js
        sed -i "s|host: argoDomain|host: appHost|g" index.js
        sed -i "s|sni: argoDomain|sni: appHost|g" index.js
        sed -i "s|host=\${argoDomain}|host=\${appHost}|g" index.js
        sed -i "s|sni=\${argoDomain}|sni=\${appHost}|g" index.js
        sed -i "s|@\${CFIP}:\${CFPORT}|@\${appHost}:443|g" index.js

        echo "=== All patches applied ==="

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/binxueoo/sap-node:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Install CF CLI
      run: |
        sudo apt-get update
        sudo apt-get install -y wget curl gnupg
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo gpg --dearmor -o /usr/share/keyrings/cloudfoundry-cli.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloudfoundry-cli.gpg] https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update
        sudo apt-get install -y cf8-cli

    - name: Determine CF API endpoint and app name
      run: |
        RANDOM_STR=$(head /dev/urandom | tr -dc 'a-z' | head -c 6)
        case "${{ github.event.inputs.region }}" in
          "SG(free)")
            echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=free-sg$RANDOM_STR" >> $GITHUB_ENV
            ;;
          *)
            echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=free-us$RANDOM_STR" >> $GITHUB_ENV
            ;;
        esac
        if [ -n "${{ github.event.inputs.app_name }}" ]; then
          echo "APP_NAME=${{ github.event.inputs.app_name }}" >> $GITHUB_ENV
        fi
        echo "DOCKER_IMAGE=ghcr.io/binxueoo/sap-node:latest" >> $GITHUB_ENV
        echo "APP_NAME=$APP_NAME"

    - name: Login to Cloud Foundry
      run: |
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}" && echo "Login OK" || { echo "CF login failed"; exit 1; }
        ORG=$(cf orgs 2>/dev/null | awk 'NR>=4 {print $1}' | head -1)
        if [ -z "$ORG" ]; then echo "No org found"; exit 1; fi
        echo "ORG=$ORG" >> $GITHUB_ENV
        SPACE=$(cf spaces 2>/dev/null | awk 'NR>=4 {print $1}' | head -1)
        if [ -z "$SPACE" ]; then echo "No space found"; exit 1; fi
        echo "SPACE=$SPACE" >> $GITHUB_ENV
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}" -o "$ORG" -s "$SPACE" || { echo "Re-login failed"; exit 1; }
        cf target

    - name: Clean up existing apps
      run: |
        APPS=$(cf apps | awk 'NR>3 {print $1}')
        if [ -n "$APPS" ]; then
          for app in $APPS; do
            cf delete "$app" -r -f
          done
          sleep 10
        fi

    - name: Deploy application
      run: |
        echo "Deploying with image: ${{ env.DOCKER_IMAGE }}"
        if cf push ${{ env.APP_NAME }} --docker-image ${{ env.DOCKER_IMAGE }} -m ${{ env.MEMORY }} -k ${{ env.DISK }} --health-check-type port; then
          echo "Deployment successful"
        else
          cf delete ${{ env.APP_NAME }} -r -f
          echo "Deployment failed"
          exit 1
        fi

    - name: Set environment variables
      run: |
        APP_URL="https://${{ env.APP_NAME }}.cfapps.ap21.hana.ondemand.com"
        if [[ "${{ github.event.inputs.region }}" == "US(free)" ]]; then
          APP_URL="https://${{ env.APP_NAME }}.cfapps.us10-001.hana.ondemand.com"
        fi
        cf set-env ${{ env.APP_NAME }} NAME "SAP"
        cf set-env ${{ env.APP_NAME }} UUID "${{ secrets.UUID }}"
        cf set-env ${{ env.APP_NAME }} NEZHA_SERVER "${{ secrets.NEZHA_SERVER }}"
        cf set-env ${{ env.APP_NAME }} NEZHA_PORT "${{ secrets.NEZHA_PORT }}"
        cf set-env ${{ env.APP_NAME }} NEZHA_KEY "${{ secrets.NEZHA_KEY }}"
        cf set-env ${{ env.APP_NAME }} ARGO_PORT "${{ secrets.ARGO_PORT }}"
        cf set-env ${{ env.APP_NAME }} ARGO_DOMAIN ""
        cf set-env ${{ env.APP_NAME }} ARGO_AUTH ""
        cf set-env ${{ env.APP_NAME }} SUB_PATH "${{ secrets.SUB_PATH }}"
        cf set-env ${{ env.APP_NAME }} CFIP ""
        cf set-env ${{ env.APP_NAME }} CFPORT ""
        cf set-env ${{ env.APP_NAME }} APP_URL "$APP_URL"
        cf set-env ${{ env.APP_NAME }} CHAT_ID "${{ secrets.CHAT_ID }}"
        cf set-env ${{ env.APP_NAME }} BOT_TOKEN "${{ secrets.BOT_TOKEN }}"
        echo "All env vars set. APP_URL=$APP_URL"

    - name: Restage application
      run: cf restage ${{ env.APP_NAME }}

    - name: Check app logs
      run: |
        cf env ${{ env.APP_NAME }}
        cf logs ${{ env.APP_NAME }} --recent 2>&1

    - name: Deployment info
      run: |
        echo "=========================================="
        echo "  DEPLOYMENT SUCCESSFUL (No Argo Tunnel)"
        echo "=========================================="
        ROUTE=$(cf app ${{ env.APP_NAME }} | grep "routes:" | awk '{print $2}')
        echo "App: ${{ env.APP_NAME }}"
        echo "URL: https://$ROUTE"
        echo "Subscription: https://$ROUTE/${{ secrets.SUB_PATH }}"
        echo "=========================================="
